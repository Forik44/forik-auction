# Автодеплой на MonsterASP.NET через WebDeploy.
# Несекретные значения (имя сайта, адрес сервера, логин) заданы прямо здесь —
# секретным остаётся только пароль WebDeploy (secrets.SERVER_PASSWORD).
name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/ForikAuction/ForikAuction.csproj

      - name: Test (игровая логика)
        run: dotnet run --project tests/ForikAuction.Tests/ForikAuction.Tests.csproj -c Release

      - name: Publish
        run: dotnet publish src/ForikAuction/ForikAuction.csproj --configuration Release --output ./publish --runtime win-x86

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: site75556
          server-computer-name: https://site75556.siteasp.net:8172
          server-username: site75556
          server-password: ${{ secrets.SERVER_PASSWORD }}
