# Автодеплой на MonsterASP.NET при каждом пуше в ветку main.
# Значения секретов берутся из панели MonsterASP.NET (Websites -> ваш сайт -> "Publish profile" / WebDeploy)
# и кладутся в GitHub: Settings -> Secrets and variables -> Actions.
name: Deploy to MonsterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/ForikAuction/ForikAuction.csproj

      - name: Test (игровая логика)
        run: dotnet run --project tests/ForikAuction.Tests/ForikAuction.Tests.csproj -c Release

      - name: Publish
        run: dotnet publish src/ForikAuction/ForikAuction.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Deploy (Web Deploy)
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTER_WEBSITE_NAME }}
          server-computer-name: ${{ secrets.MONSTER_SERVER }}
          server-username: ${{ secrets.MONSTER_USERNAME }}
          server-password: ${{ secrets.MONSTER_PASSWORD }}
          source-path: ${{ github.workspace }}/publish
