# Автодеплой на MonsterASP.NET через WebDeploy.
# Сборка идёт на серверах GitHub (dotnet publish), затем готовое приложение
# заливается на хостинг. Значения секретов — из панели MonsterASP.NET, блок
# "WebDeploy Access" (Settings -> Secrets and variables -> Actions в GitHub).
name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/ForikAuction/ForikAuction.csproj

      - name: Test (игровая логика)
        run: dotnet run --project tests/ForikAuction.Tests/ForikAuction.Tests.csproj -c Release

      - name: Publish
        run: dotnet publish src/ForikAuction/ForikAuction.csproj --configuration Release --output ./publish --runtime win-x86

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
